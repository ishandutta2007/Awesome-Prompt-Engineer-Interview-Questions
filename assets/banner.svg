<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a00e0;stop-opacity:1">
        <animate attributeName="stop-color" values="#4a00e0;#8e2de2;#4a00e0" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color:#8e2de2;stop-opacity:1">
        <animate attributeName="stop-color" values="#8e2de2;#4a00e0;#8e2de2" dur="5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="200" fill="url(#grad)" rx="15" ry="15"/>
  
  <!-- Dynamic floating particles -->
  <circle cx="100" cy="50" r="4" fill="#ffffff" opacity="0.6">
    <animate attributeName="cy" values="50;30;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="150" r="6" fill="#ffffff" opacity="0.5">
    <animate attributeName="cy" values="150;120;150" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="160" r="5" fill="#ffffff" opacity="0.3">
    <animate attributeName="cy" values="160;180;160" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="40" r="3" fill="#ffffff" opacity="0.8">
    <animate attributeName="cy" values="40;70;40" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="150" r="3" fill="#ffffff" opacity="0.4">
    <animate attributeName="cy" values="150;120;150" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="20" r="2" fill="#ffffff" opacity="0.7">
    <animate attributeName="cy" values="20;40;20" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <text x="400" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
    Awesome Prompt Engineer
  </text>
  <text x="400" y="145" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="500" fill="#e0e0e0" text-anchor="middle">
    Interview Questions 🚀
  </text>
</svg>
